spring.application.name=modelo_api_rest

# --- CONFIGURAÇÃO PADRÃO: H2 (Roda em qualquer máquina) ---
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Ativar a execução dos arquivos SQL sempre que o projeto iniciar
spring.sql.init.mode=always

# REGRA DE OURO: Garantir a ordem de execução! 🚨
# O Spring deve primeiro criar as tabelas vazias (schema) usando as nossas @Entities,
# e SÓ DEPOIS inserir os dados do arquivo data.sql.
spring.jpa.defer-datasource-initialization=true

